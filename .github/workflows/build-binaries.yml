name: Build Binaries

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and upload binaries
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget libelf-dev

      - name: Clone OpenWRT
        run: |
          git clone -b v25.12.2 https://git.openwrt.org/openwrt/openwrt.git --depth=1
      
      - name: Update Feeds
        run: |
          cd openwrt
          echo "src-git openclash https://github.com/vernesong/OpenClash" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Custom Config
        run: |
          cp r3g.config openwrt/.config
          cd openwrt
          make defconfig
      
      - name: Download sources
        run: |
          cd openwrt
          make download -j$(nproc)
      
      - name: Build firmware
        run: |
          cd openwrt
          make V=s -j$(nproc)

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-ramips-mt7621-xiaomi_mi-router-3g-squashfs-sysupgrade.bin
          path: openwrt/bin/targets/ramips/mt7621/openwrt-ramips-mt7621-xiaomi_mi-router-3g-squashfs-sysupgrade.bin
